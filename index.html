<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/b8761b87ac.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/index.css" />
    <title>Epicode M4 W4 D1</title>
  </head>
  <body>
    <header>
      <!-- Navbar -->
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <img
              src="./assets/img/logo.png"
              class="rounded-circle"
              alt="logo"
            />
            E-commerce</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="./index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="#"
                  data-bs-toggle="modal"
                  data-bs-target="#loginModal"
                  >Backend</a
                >
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <!-- Hero Secion -->
    <section id="hero" class="mb-4 mt-2">
      <div class="p-5 px-3 text-center bgImage rounded-3">
        <div>
          <div class="d-flex justify-content-start align-items-center h-100">
            <div class="text-white text-start">
              <h1 class="mb-3">Hi-Tech Shop</h1>
              <h4 class="mb-3">High quality tech finds!</h4>
              <a class="btn btn-outline-light btn-lg" href="#!" role="button"
                >Shop Now <i class="fa-solid fa-arrow-right"></i
              ></a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Alert -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Welcome Back!</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Myname"
                    id="userName"
                  />
                  <span class="input-group-text">
                    <i class="fas fa-pencil-square"></i>
                  </span>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    placeholder="Enter your password"
                    id="password"
                  />
                  <span class="input-group-text password-toggle">
                    <i class="fas fa-eye"></i>
                  </span>
                </div>
              </div>

              <div class="form-check">
                <div>
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="remember"
                  />
                  <label class="form-check-label" for="remember"
                    >Remember me</label
                  >
                </div>
              </div>

              <button type="submit" class="btn btn-success text-white">
                Sign In
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Main -->
    <main class="container-md mb-4">
      <!-- Swider main container -->
      <h2>Last Offers</h2>
      <div class="swiper">
        <!-- wrapper -->
        <div class="swiper-wrapper"></div>
        <!-- pagination -->
        <div class="swiper-pagination"></div>

        <!-- buttons -->
        <div class="swiper-button-prev d-none d-lg-flex"></div>
        <div class="swiper-button-next d-none d-lg-flex"></div>

        <!-- scrollbar -->
        <div class="swiper-scrollbar"></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="./assets/js/index.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
