<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/b8761b87ac.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/index.css" />
    <title>E-commerce Homepage</title>
  </head>
  <body>
    <header class="py-4">
      <div class="container d-flex justify-content-center">
        <nav
          class="navbar navbar-expand-lg bg-dark rounded-5 shadow-lg px-3 py-2 w-100"
          style="max-width: 800px"
        >
          <div class="container-fluid">
            <a class="navbar-brand m-0" href="#">
              <div
                class="bg-white rounded-circle d-flex align-items-center justify-content-center overflow-hidden"
                style="width: 45px; height: 45px"
              >
                <img
                  src="./assets/img/logo.png"
                  alt="logo"
                  class="w-100 h-100 object-fit-cover"
                />
              </div>
            </a>

            <button
              class="navbar-toggler border-0 shadow-none bg-light"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#floatingNav"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse text-center" id="floatingNav">
              <ul
                class="navbar-nav mx-auto mb-3 mb-lg-0 gap-2 gap-lg-3 mt-3 mt-lg-0"
              >
                <li class="nav-item">
                  <a
                    class="nav-link text-secondary fw-medium"
                    href="./index.html"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link text-white fw-medium"
                    href="#"
                    data-bs-toggle="modal"
                    data-bs-target="#loginModal"
                    >Backend</a
                  >
                </li>
              </ul>

              <div
                class="d-flex align-items-center justify-content-center mt-2 mt-lg-0"
              >
                <button
                  class="btn btn-light rounded-pill px-4 fw-bold d-flex align-items-center gap-2"
                >
                  <i class="fa-solid fa-cart-shopping"></i>
                  Cart
                </button>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <!-- Hero Secion -->
    <section id="hero" class="mb-4 p-5">
      <div class="p-5 px-3 text-center bgImage rounded-3">
        <div>
          <div class="d-flex justify-content-start align-items-center h-100">
            <div
              class="text-white text-start bg-dark bg-opacity-50 w-100 px-4 py-2 rounded-4"
            >
              <h1 class="mb-3">Hi-Tech Shop</h1>
              <h4 class="mb-3">High quality tech finds!</h4>
              <a class="btn btn-outline-light btn-lg" href="#!" role="button"
                >Shop Now <i class="fa-solid fa-arrow-right"></i
              ></a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Alert -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Welcome Back!</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Myname"
                    id="userName"
                  />
                  <span class="input-group-text">
                    <i class="fas fa-pencil-square"></i>
                  </span>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    placeholder="Enter your password"
                    id="password"
                  />
                  <span class="input-group-text password-toggle">
                    <i class="fas fa-eye"></i>
                  </span>
                </div>
              </div>
              <button type="submit" class="btn btn-success text-white">
                Sign In
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Main -->
    <main>
      <section class="container-md mb-4" id="products">
        <!-- Swider main container -->
        <h2>Last Offers</h2>
        <!-- Spinner -->
        <div class="spinner d-none">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
        <div class="swiper">
          <!-- wrapper -->
          <div class="swiper-wrapper"></div>
          <!-- pagination -->
          <div class="swiper-pagination"></div>

          <!-- buttons -->
          <div class="swiper-button-prev d-none d-lg-flex"></div>
          <div class="swiper-button-next d-none d-lg-flex"></div>

          <!-- scrollbar -->
          <div class="swiper-scrollbar"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="./assets/js/index.js"></script>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
