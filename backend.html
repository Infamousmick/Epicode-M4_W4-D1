<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/b8761b87ac.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>E-commerce Backend</title>
  </head>
  <body>
    <header>
      <!-- Navbar -->
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <img
              src="./assets/img/logo.png"
              class="rounded-circle"
              alt="logo"
            />
            E-commerce</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="./index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./backend.html">Backend</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <!-- Add Item -->
    <div class="container-md mt-3 d-flex flex-column align-items-center gap-2">
      <h2 class="title text-success">Backend</h2>
      <form id="addProduct">
        <div class="mb-1">
          <label for="name" class="form-label">Product name</label>
          <input type="text" class="form-control" id="name" />
        </div>
        <div class="mb-1">
          <label for="description" class="form-label">Description</label>
          <input type="text" class="form-control" id="description" />
        </div>
        <div class="mb-1">
          <label for="brand" class="form-label">Brand Name</label>
          <input type="text" class="form-control" id="brand" />
        </div>
        <div class="mb-1">
          <label for="iamgeUrl" class="form-label">Image Url</label>
          <input type="url" class="form-control" id="imageUrl" />
        </div>
        <div class="mb-1">
          <label for="price" class="form-label"
            >Price <strong>(€)</strong></label
          >
          <input type="number" class="form-control" id="price" />
        </div>

        <button type="submit" class="btn btn-primary add">Add Product</button>
      </form>
    </div>

    <!-- Table -->
    <div class="container-md mt-3">
      <table class="table">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Description</th>
            <th scope="col">Brand</th>
            <th scope="col">Image</th>
            <th scope="col">Price</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Alert -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="updateItem"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      tabindex="-1"
      aria-labelledby="updateItemLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="updateItemLabel">
              Modifica ELemento
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="updateProduct">
              <div class="mb-1">
                <label for="name" class="form-label">Product name</label>
                <input type="text" class="form-control" id="name" />
              </div>
              <div class="mb-1">
                <label for="description" class="form-label">Description</label>
                <input type="text" class="form-control" id="description" />
              </div>
              <div class="mb-1">
                <label for="brand" class="form-label">Brand Name</label>
                <input type="text" class="form-control" id="brand" />
              </div>
              <div class="mb-1">
                <label for="iamgeUrl" class="form-label">Image Url</label>
                <input type="url" class="form-control" id="imageUrl" />
              </div>
              <div class="mb-1">
                <label for="price" class="form-label"
                  >Price <strong>(€)</strong></label
                >
                <input type="number" class="form-control" id="price" />
              </div>

              <button type="submit" class="btn btn-primary update">
                Update Product
              </button>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-primary">Understood</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/backend.js"></script>
  </body>
</html>
