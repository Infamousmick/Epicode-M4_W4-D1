<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/b8761b87ac.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="assets/css/backend.css" />
    <title>E-commerce</title>
  </head>
  <body>
    <header class="py-4">
      <div class="container d-flex justify-content-center">
        <nav
          class="navbar navbar-expand-lg bg-dark rounded-5 shadow-lg px-3 py-2 w-100"
          style="max-width: 800px"
        >
          <div class="container-fluid">
            <a class="navbar-brand m-0" href="#">
              <div
                class="bg-white rounded-circle d-flex align-items-center justify-content-center overflow-hidden"
                style="width: 45px; height: 45px"
              >
                <img
                  src="./assets/img/logo.png"
                  alt="logo"
                  class="w-100 h-100 object-fit-cover"
                />
              </div>
            </a>

            <button
              class="navbar-toggler border-0 shadow-none bg-light"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#floatingNav"
            >
              <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse text-center" id="floatingNav">
              <ul
                class="navbar-nav mx-auto mb-3 mb-lg-0 gap-2 gap-lg-3 mt-3 mt-lg-0"
              >
                <li class="nav-item">
                  <a class="nav-link text-white fw-medium" href="./index.html"
                    >Home</a
                  >
                </li>
                <li class="nav-item">
                  <a class="nav-link text-secondary fw-medium" href="#"
                    >Catalogo Prodotti</a
                  >
                </li>
              </ul>

              <div
                class="d-flex align-items-center justify-content-center mt-2 mt-lg-0"
              >
                <button
                  class="btn btn-light rounded-pill px-4 fw-bold d-flex align-items-center gap-2"
                >
                  <i class="fa-solid fa-cart-shopping"></i>
                  Cart
                </button>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <!-- Add Item -->
    <div class="container-md mt-3 d-flex flex-column align-items-center gap-2">
      <h2 class="title text-success">Catalogo Prodotti</h2>
      <button
        class="w-100 p-3 btn btn-success addProduct"
        data-bs-toggle="modal"
        data-bs-target="#updateItem"
      >
        Aggiungi prodotto
      </button>
    </div>

    <div class="container-md mt-4">
      <div id="products-container" class="d-flex flex-column gap-3"></div>
    </div>

    <!-- Alert -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="updateItem"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      tabindex="-1"
      aria-labelledby="updateItemLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="updateItemLabel">
              Modifica Elemento
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="updateProduct">
              <div class="mb-1">
                <label for="name" class="form-label">Product name</label>
                <input type="text" class="form-control" id="name" />
              </div>
              <div class="mb-1">
                <label for="description" class="form-label">Description</label>
                <input type="text" class="form-control" id="description" />
              </div>
              <div class="mb-1">
                <label for="brand" class="form-label">Brand Name</label>
                <input type="text" class="form-control" id="brand" />
              </div>
              <div class="mb-1">
                <label for="imageUrl" class="form-label">Image Url</label>
                <input type="url" class="form-control" id="imageUrl" />
              </div>
              <div class="mb-1">
                <label for="price" class="form-label"
                  >Price <strong>(€)</strong></label
                >
                <input type="number" class="form-control" id="price" />
              </div>

              <button type="submit" id="mainSubmitBtn" class="btn btn-primary">
                Salva
              </button>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/backend.js"></script>
  </body>
</html>
